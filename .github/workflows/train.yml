name: Training Model

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  train:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r MLProject/requirements.txt

      - name: Train Model
        run: |
          cd MLProject
          python modelling.py

      - name: Upload Model
        uses: actions/upload-artifact@v4

        with:
          name: best-model
          path: MLProject/best_model.keras

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t plantvillage-model ./MLProject

      - name: Tag Docker Image
        run: |
          docker tag plantvillage-model \
          ${{ secrets.DOCKER_USERNAME }}/plantvillage-model:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/plantvillage-model:latest